<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melissa's Tennessee Real Estate</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f4f4;
margin:0;
padding:0;
}

header{
background:#003366;
color:white;
padding:40px;
text-align:center;
}

.container{
width:90%;
max-width:900px;
margin:auto;
padding:30px;
background:white;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border-radius:5px;
border:1px solid #ccc;

}

button{
background:#0078D4;
color:white;
padding:15px;
border:none;
width:100%;
font-size:18px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#005fa3;
}

footer{
text-align:center;
padding:20px;

}

<body>

<header>

<h3>Helping Buyers and Sellers Throughout Tennessee</h3>

<div class="container">

<h2>Get Started Today</h2>

<form>

<label>Name</label>
<input type="text">

<label>Email</label>
<input type="email">

<label>Phone Number</label>
<input type="tel">

<label>I'm interested in...</label>

<select>

<option>Buying a Home</option>

<option>Selling a Home</option>

<option>Buying & Selling</option>

<option>Investment Property</option>

</select>

<textarea rows="6"></textarea>

Request My Free Consultation
</button>

</div>

<footer>

© 2026 Melissa • United Real Estate Solutions

</footer>
