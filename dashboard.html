<!DOCTYPE html>
<html>
<head>
<title>Melissa Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.card{
background:white;
padding:20px;
margin:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

h1{
color:#0078D4;
}

.big{
font-size:42px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Melissa's Lead Dashboard</h1>

<div class="card">
<h2>Total Leads</h2>
<div class="big">0</div>
</div>

<div class="card">
<h2>Buyers</h2>
<div class="big">0</div>
</div>

<div class="card">
<h2>Sellers</h2>
<div class="big">0</div>
</div>

<div class="card">
<h2>Average HomeReady Score</h2>
<div class="big">0%</div>
</div>
<div class="card">
  <h2>Recent Leads</h2>

  <table style="width:100%; border-collapse:collapse;">
    <thead>
      <tr style="text-align:left; border-bottom:1px solid #ddd;">
        <th style="padding:10px;">Name</th>
        <th style="padding:10px;">Type</th>
        <th style="padding:10px;">Location</th>
        <th style="padding:10px;">Status</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td style="padding:10px;">No leads yet</td>
        <td style="padding:10px;">—</td>
        <td style="padding:10px;">—</td>
        <td style="padding:10px;">Waiting for submissions</td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
